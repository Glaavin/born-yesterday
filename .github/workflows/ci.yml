name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          # pnpm is provided by corepack in the next step, so it isn't on PATH
          # yet when setup-node runs. Disable v5's built-in package-manager cache
          # (default-on in v5) to avoid "Unable to locate executable file: pnpm".
          package-manager-cache: false

      - name: Enable corepack (pnpm from packageManager field)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (incl. design-system Layer 1 token guardrail)
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
